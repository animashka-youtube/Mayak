<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>div-table</title>
    <style type="text/css">
        * {margin: 0; padding: 0; border: 0; outline: 0; background: transparent;}
    
        .main_div {
            margin-top: 10vh;
            width: 100%;
        }
    
        .yacheika {
            display: inline-block;
            border: 2px solid black;
            padding: 10px 0;
        }
        p{
            text-align: center;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="main_div" style="display: flex; border: 2px solid black;">
        <div>
            <div class="yacheika" style="width: 100%;"><p style="transform: none;">1</p></div>
            <div style="display: flex;">
                <div style="display: flex; flex-wrap: wrap;">
                    <div class="yacheika" style="width: 100%; height: 20vh; display: block;"><p>3</p></div>
                    <div class="yacheika" style="width: 33vw; display: block;"><p>7</p></div>
                </div>
                <div style="display: flex; flex-wrap: wrap;">
                    <div class="yacheika" style="width: 100%; height: 8.6vh;"><p>4</p></div>
                    <div class="yacheika" style="width: 17vw; height: 16.2vh;"><p>5</p></div>
                </div>
                
            </div>
            <div style="display: flex;">
                <div class="yacheika" style="width: 50%; height: 10vh; display: block;"><p>8</p></div>
                <div class="yacheika" style="width: 50%; height: 10vh;"><p>9</p></div>
            </div>
        </div>
    
        <div style="display: inline-block;">
            <div class="yacheika" style="width: 50vw; height: 31.7%;"><p>2</p></div>
            <div class="yacheika" style="width: 50vw; height: 31.7%; display: block;"><p>6</p></div>
            <div style="display: flex;">
                <div class="yacheika" style="width: 50%; height: 10vh; display: block;"><p>10</p></div>
                <div class="yacheika" style="width: 50%; height: 10vh;"><p>11</p></div>
            </div>
        </div>
    </div>
        
        
</body>
</html>
